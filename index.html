<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Rey Dariagan | Independent Songwriter</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d0d11;
            --card-bg: #16161f;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #1db954; /* Spotify Green */
            --accent-hover: #1ed760;
            --max-width: 800px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: var(--max-width);
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        /* Profile Section */
        .profile-img-container {
            width: 160px;
            height: 160px;
            margin: 0 auto 24px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--accent);
            box-shadow: 0 0 20px rgba(29, 185, 84, 0.2);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 1.1rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .bio {
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 32px;
            font-size: 1rem;
            font-weight: 300;
        }

        /* Social Icons */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .social-icon {
            color: var(--text-main);
            font-size: 1.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-icon:hover {
            color: #ffffff;
            background: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(29, 185, 84, 0.4);
        }

        /* Music Section */
        .section-title {
            font-size: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-weight: 600;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        .spotify-embed {
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 32px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Footer */
        footer {
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Responsive Settings */
        @media (max-width: 600px) {
            body {
                padding: 20px 10px;
            }
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Profile Picture -->
        <div class="profile-img-container">
            <!-- Replace the placeholder URL with your actual image path or URL -->
            <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400&auto=format&fit=crop&q=80" alt="John Rey Dariagan" class="profile-img">
        </div>

        <!-- Header Info -->
        <h1>John Rey Dariagan</h1>
        <p class="tagline">Independent Songwriter</p>
        <p class="bio">Crafting original melodies and authentic stories. Open to co-writing, production collaborations, and licensing opportunities.</p>

        <!-- Social Media Links -->
        <div class="social-links">
            <a href="https://spotify.com" target="_blank" class="social-icon" aria-label="Spotify"><i class="fab fa-spotify"></i></a>
            <a href="https://instagram.com" target="_blank" class="social-icon" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://youtube.com" target="_blank" class="social-icon" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
            <a href="mailto:your-email@example.com" class="social-icon" aria-label="Email"><i class="fas fa-envelope"></i></a>
        </div>

        <!-- Featured Music Section -->
        <h2 class="section-title">Featured Work</h2>
        <div class="spotify-embed">
            <!-- Replace the link inside src with your own Spotify Artist, Track, or Playlist embed link -->
            <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGmq6v8e?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

        <!-- Footer -->
        <footer>
            <p>&copy; 2026 John Rey Dariagan. All Rights Reserved.</p>
        </footer>
    </div>

</body>
</html>
